<!DOCTYPE html>
<html lang="th" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C-Drama Hub | เข้าสู่ระบบ</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans Thai"', 'sans-serif'] },
          colors: { 
            brand: { 50: '#fff1f2', 400: '#fb7185', 500: '#f43f5e', 600: '#e11d48' },
            surface: '#121214',
            surfaceSoft: '#1c1c1f',
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0, transform: 'scale(0.95)' },
              '100%': { opacity: 1, transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body { overflow-x: hidden; -webkit-font-smoothing: antialiased; transition: background-color 0.3s, color 0.3s; }
    
    .bg-blobs { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; transform: translateZ(0); }
    html:not(.dark) .blob { opacity: 0.08; }
    
    .glass-card { background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(249, 250, 251, 0.95) 100%); border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
    html.dark .glass-card { background: linear-gradient(180deg, rgba(28, 28, 31, 0.8) 0%, rgba(18, 18, 20, 0.9) 100%); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    
    .input-field { transition: all 0.2s ease; }
    .input-field:focus { transform: translateY(-1px); }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-[#09090b] dark:text-[#fafafa] selection:bg-brand-500 selection:text-white min-h-screen flex flex-col">

  <!-- Background Ambient Lights -->
  <div class="bg-blobs">
    <div class="blob bg-brand-600 w-96 h-96 top-[-10%] left-[-10%] animate-pulse-slow"></div>
    <div class="blob bg-blue-600 w-[500px] h-[500px] bottom-[-20%] right-[-10%] animate-pulse-slow" style="animation-delay: 2s;"></div>
  </div>

  <!-- Toast Notification -->
  <div id="toastBox" class="fixed top-4 right-4 z-50 hidden items-center gap-3 px-5 py-4 rounded-2xl text-sm font-medium shadow-2xl transition-all duration-300 transform translate-y-[-20px] opacity-0">
    <i id="toastIcon" class="fa-solid fa-circle-info text-lg"></i>
    <span id="toastText"></span>
  </div>

  <!-- Navbar (Simple) -->
  <nav class="w-full relative z-40 p-6 flex justify-between items-center max-w-7xl mx-auto">
    <a href="index.html" class="flex items-center gap-3 text-gray-900 dark:text-white font-black text-xl tracking-tight hover:opacity-80 transition-opacity">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/30">
        <i class="fa-solid fa-play text-white text-xs ml-0.5"></i>
                <img src="jomyut_1.png" alt="Series By Night Star - บริการซีรีย์จีน" class="w-full max-w-md md:max-w-lg object-contain drop-shadow-2xl rounded-2xl dark:border-white/10" onerror="this.style.display='none'" />
      </div>
      NIGHTSTAR DRAMA
    </a>
    <a href="index.html" class="text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-brand-500 transition-colors flex items-center gap-2">
      <i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก
    </a>
  </nav>

  <!-- Auth Container -->
  <main class="flex-1 flex items-center justify-center p-4 relative z-10">
    <div class="w-full max-w-md animate-fade-in">
      <div class="glass-card rounded-3xl p-8 sm:p-10 relative overflow-hidden">
        
        <!-- Header -->
        <div class="text-center mb-8">
          <h1 id="formTitle" class="text-2xl font-black text-gray-900 dark:text-white mb-2">ยินดีต้อนรับกลับมา</h1>
          <p id="formSubtitle" class="text-sm text-gray-500 dark:text-gray-400">เข้าสู่ระบบเพื่อบันทึกซีรี่ย์โปรดของคุณ</p>
        </div>

        <!-- Google Login Button -->
        <button id="googleLoginBtn" onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 font-medium py-3 px-4 border border-gray-200 rounded-xl shadow-sm transition-all hover:shadow-md mb-6 relative overflow-hidden group">
          <div class="absolute inset-0 w-full h-full bg-gray-50 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <svg class="w-5 h-5 relative z-10" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span id="googleBtnText" class="relative z-10">ดำเนินการต่อด้วย Google</span>
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-4 mb-6">
          <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
          <span class="text-xs font-medium text-gray-400 dark:text-gray-500 uppercase tracking-wider">หรือใช้อีเมล</span>
          <div class="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
        </div>

        <!-- Forms -->
        <form id="authForm" onsubmit="handleSubmit(event)" class="space-y-4">
          
          <div id="nameField" class="hidden">
            <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1.5 ml-1">ชื่อผู้ใช้งาน</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-regular fa-user"></i>
              </div>
              <input type="text" id="nameInput" placeholder="ชื่อที่ใช้แสดง" class="input-field w-full bg-gray-100 dark:bg-black/50 border border-gray-200 dark:border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500 transition-all placeholder:text-gray-400">
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-600 dark:text-gray-400 mb-1.5 ml-1">อีเมล</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-regular fa-envelope"></i>
              </div>
              <input type="email" id="emailInput" required placeholder="name@example.com" class="input-field w-full bg-gray-100 dark:bg-black/50 border border-gray-200 dark:border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500 transition-all placeholder:text-gray-400">
            </div>
          </div>

          <div>
            <div class="flex justify-between items-center mb-1.5 ml-1">
              <label class="block text-xs font-medium text-gray-600 dark:text-gray-400">รหัสผ่าน</label>
              <a href="#" id="forgotPassword" class="text-xs text-brand-500 hover:text-brand-400 font-medium">ลืมรหัสผ่าน?</a>
            </div>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                <i class="fa-solid fa-lock"></i>
              </div>
              <input type="password" id="passwordInput" required placeholder="••••••••" class="input-field w-full bg-gray-100 dark:bg-black/50 border border-gray-200 dark:border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-1 focus:ring-brand-500 focus:border-brand-500 transition-all placeholder:text-gray-400 tracking-wider">
            </div>
          </div>

          <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0 mt-6">
            เข้าสู่ระบบ
          </button>
        </form>

        <!-- Toggle Mode -->
        <div class="mt-8 text-center text-sm text-gray-600 dark:text-gray-400">
          <span id="toggleText">ยังไม่มีบัญชีใช่ไหม?</span> 
          <button onclick="toggleMode()" id="toggleBtn" class="text-brand-500 hover:text-brand-400 font-bold ml-1 transition-colors">สมัครสมาชิกฟรี</button>
        </div>

      </div>
    </div>
  </main>

  <!-- 🟢 โค้ดส่วนเชื่อมต่อ Firebase -->
  <script type="module">
    // นำเข้า Firebase SDK จาก CDN แบบ Module
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 1️⃣ นำค่า Config จากเว็บ Firebase มาใส่ในนี้ทั้งหมดครับ
    const firebaseConfig = {
        apiKey: "AIzaSyC11kV0QM83HKHjV2t4Tspr7j8p3Ss0pIQ",
        authDomain: "nightstarserver-b2cff.firebaseapp.com",
        projectId: "nightstarserver-b2cff",
        storageBucket: "nightstarserver-b2cff.firebasestorage.app",
        messagingSenderId: "770400433125",
        appId: "1:770400433125:web:5a142dfa12b62bfd47b50c"
    };

    let auth, provider;

    try {
      // เริ่มต้นระบบ Firebase
      const app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      provider = new GoogleAuthProvider();

      // ตรวจสอบสถานะ: ถ้าล็อกอินอยู่แล้ว ให้เด้งกลับหน้าแรกทันที
      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = 'index.html';
        }
      });
    } catch (error) {
      console.warn("ยังไม่ได้ตั้งค่า Firebase Config");
    }

    // ฟังก์ชันเข้าสู่ระบบด้วย Google
    window.loginWithGoogle = async () => {
      if (!auth) {
        showToast('กรุณาตั้งค่า Firebase Config ในโค้ดก่อนใช้งานครับ', 'error');
        return;
      }

      const btn = document.getElementById('googleLoginBtn');
      const btnText = document.getElementById('googleBtnText');
      const originalText = btnText.innerHTML;

      try {
        // แสดงสถานะหมุนๆ ที่ปุ่ม
        btnText.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังเชื่อมต่อ...`;
        btn.disabled = true;
        btn.classList.add('opacity-70', 'cursor-not-allowed');

        // หน้าต่าง Google เด้งขึ้นมาให้กดเลือกบัญชี
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        showToast(`ยินดีต้อนรับคุณ ${user.displayName}!`, 'success');
        
        // สำเร็จ พาไปหน้าแรก
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);

      } catch (error) {
        console.error("Google Login Error:", error);
        showToast('การเข้าสู่ระบบถูกยกเลิก หรือมีข้อผิดพลาด', 'error');
        btnText.innerHTML = originalText;
        btn.disabled = false;
        btn.classList.remove('opacity-70', 'cursor-not-allowed');
      }
    };

    // ฟังก์ชันจัดการสมัครสมาชิกและเข้าสู่ระบบด้วยอีเมล/รหัสผ่าน
    window.handleSubmit = async function(e) {
      e.preventDefault();
      
      if (!auth) {
        showToast('กรุณาตั้งค่า Firebase Config ในโค้ดก่อนใช้งานครับ', 'error');
        return;
      }

      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const name = document.getElementById('nameInput').value;
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerText;
      
      // แสดงสถานะ Loading 
      submitBtn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> กำลังดำเนินการ...`;
      submitBtn.disabled = true;
      submitBtn.classList.add('opacity-75', 'cursor-not-allowed');

      try {
        if (window.isLoginMode) {
          // โหมด: เข้าสู่ระบบ
          await signInWithEmailAndPassword(auth, email, password);
          showToast('เข้าสู่ระบบสำเร็จ!', 'success');
        } else {
          // โหมด: สมัครสมาชิก
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          
          // อัปเดตชื่อผู้ใช้งาน (Display Name)
          await updateProfile(userCredential.user, {
            displayName: name || 'ผู้ใช้งานใหม่'
          });
          
          showToast('สมัครสมาชิกสำเร็จ!', 'success');
        }

        // หากสำเร็จ เปลี่ยนสีปุ่มเป็นสีเขียวและพากลับไปหน้าหลัก
        submitBtn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> สำเร็จ! กำลังพากลับ...`;
        submitBtn.classList.replace('from-brand-600', 'from-emerald-600');
        submitBtn.classList.replace('to-brand-500', 'to-emerald-500');
        submitBtn.classList.replace('shadow-brand-500/30', 'shadow-emerald-500/30');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);

      } catch (error) {
        console.error("Email Auth Error:", error);
        let errorMessage = "เกิดข้อผิดพลาดในการดำเนินการ กรุณาลองใหม่";
        
        // แปลงข้อผิดพลาดจาก Firebase เป็นภาษาไทยให้เข้าใจง่าย
        if (error.code === 'auth/email-already-in-use') {
          errorMessage = "อีเมลนี้มีผู้ใช้งานแล้ว กรุณาเข้าสู่ระบบ";
        } else if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
          errorMessage = "อีเมลหรือรหัสผ่านไม่ถูกต้อง";
        } else if (error.code === 'auth/weak-password') {
          errorMessage = "รหัสผ่านอ่อนเกินไป (ต้องมีอย่างน้อย 6 ตัวอักษร)";
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = "รูปแบบอีเมลไม่ถูกต้อง";
        }

        showToast(errorMessage, 'error');

        // คืนค่าปุ่มกลับเป็นเหมือนเดิมเพื่อให้ผู้ใช้กดใหม่ได้
        submitBtn.innerText = originalText;
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
      }
    };
  </script>

  <!-- สคริปต์ควบคุม UI ธรรมดา -->
  <script>
    // ประกาศเป็นตัวแปรแบบ Global เพื่อให้สคริปต์แบบ Module มองเห็น
    window.isLoginMode = true;

    // ตรวจสอบ Theme เพื่อให้แสดงผลตรงกับหน้าหลัก
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.remove('dark');
    }

    // ฟังก์ชันแสดงแจ้งเตือน (Toast)
    window.showToast = function(message, type = 'success') {
      const toastBox = document.getElementById('toastBox');
      const toastText = document.getElementById('toastText');
      const toastIcon = document.getElementById('toastIcon');

      toastText.innerHTML = message;
      toastBox.classList.remove('hidden');
      
      if (type === 'success') {
        toastIcon.className = 'fa-solid fa-circle-check text-lg';
        toastBox.classList.remove('bg-red-100', 'dark:border-red-500/30', 'text-red-600', 'dark:text-red-400');
        toastBox.classList.add('bg-emerald-100', 'dark:border-emerald-500/30', 'text-emerald-700', 'dark:text-emerald-400');
      } else {
        toastIcon.className = 'fa-solid fa-circle-exclamation text-lg';
        toastBox.classList.add('bg-red-100', 'dark:border-red-500/30', 'text-red-600', 'dark:text-red-400');
        toastBox.classList.remove('bg-emerald-100', 'dark:border-emerald-500/30', 'text-emerald-700', 'dark:text-emerald-400');
      }

      // Animate In
      setTimeout(() => {
        toastBox.classList.remove('translate-y-[-20px]', 'opacity-0');
      }, 10);

      // Animate Out
      setTimeout(() => {
        toastBox.classList.add('translate-y-[-20px]', 'opacity-0');
        setTimeout(() => toastBox.classList.add('hidden'), 300);
      }, 3500);
    }

    // สลับโหมด สมัคร/ล็อกอิน
    window.toggleMode = function() {
      window.isLoginMode = !window.isLoginMode;
      const formTitle = document.getElementById('formTitle');
      const formSubtitle = document.getElementById('formSubtitle');
      const nameField = document.getElementById('nameField');
      const nameInput = document.getElementById('nameInput');
      const forgotPassword = document.getElementById('forgotPassword');
      const submitBtn = document.getElementById('submitBtn');
      const toggleText = document.getElementById('toggleText');
      const toggleBtn = document.getElementById('toggleBtn');
      const form = document.getElementById('authForm');

      form.style.opacity = '0';
      
      setTimeout(() => {
        if (window.isLoginMode) {
          formTitle.innerText = "ยินดีต้อนรับกลับมา";
          formSubtitle.innerText = "เข้าสู่ระบบเพื่อบันทึกซีรี่ย์โปรดของคุณ";
          nameField.classList.add('hidden');
          nameInput.removeAttribute('required');
          forgotPassword.classList.remove('hidden');
          submitBtn.innerText = "เข้าสู่ระบบ";
          toggleText.innerText = "ยังไม่มีบัญชีใช่ไหม?";
          toggleBtn.innerText = "สมัครสมาชิกฟรี";
        } else {
          formTitle.innerText = "สร้างบัญชีใหม่";
          formSubtitle.innerText = "เข้าร่วมกับเราเพื่อปลดล็อกฟีเจอร์ทั้งหมด";
          nameField.classList.remove('hidden');
          nameInput.setAttribute('required', 'true');
          forgotPassword.classList.add('hidden');
          submitBtn.innerText = "สมัครสมาชิก";
          toggleText.innerText = "มีบัญชีอยู่แล้ว?";
          toggleBtn.innerText = "เข้าสู่ระบบ";
        }
        form.style.opacity = '1';
      }, 200);
    }
  </script>
</body>
</html>
